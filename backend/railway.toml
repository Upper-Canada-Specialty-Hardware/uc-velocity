# UC Velocity ERP - Backend Service Configuration
#
# SETUP INSTRUCTIONS:
# 1. Create new Railway project
# 2. Add PostgreSQL database (+ New → Database → PostgreSQL)
# 3. Add this service (+ New → GitHub Repo → select uc-velocity)
# 4. Set Root Directory to: backend
# 5. Add DATABASE_URL variable (reference from PostgreSQL)
# 6. Add CORS_ORIGINS variable with frontend URL after frontend is deployed
#
# Required Environment Variables:
#   DATABASE_URL    - PostgreSQL connection string (from Railway PostgreSQL)
#   CORS_ORIGINS    - Frontend URL for CORS (e.g., https://your-frontend.up.railway.app)

[build]
builder = "nixpacks"

[deploy]
# Run pending Alembic migrations exactly once per deploy, before any worker
# accepts traffic. If this exits non-zero the deploy fails before workers boot,
# so a schema/code drift can never silently ship. This replaces the previous
# per-worker ALEMBIC_AUTO_UPGRADE=1 dance, which was fail-open and easy to forget.
preDeployCommand = "python -m alembic upgrade head"
startCommand = "gunicorn main:app -w 2 -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT --timeout 300"
healthcheckPath = "/health"
healthcheckTimeout = 100
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
